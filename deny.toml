# cargo-deny config (https://embarkstudios.github.io/cargo-deny/).
# Run `cargo deny check` (install: `cargo install cargo-deny`).

[advisories]
yanked = "deny"
ignore = [
    # bincode 1.x is unmaintained (RUSTSEC-2025-0141). syntect, the highlighter, uses it
    # only to read its own bundled syntax and theme dumps - local, trusted input, never
    # untrusted deserialization. Drop this when syntect moves off bincode 1.
    "RUSTSEC-2025-0141",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
# Permissive licenses we accept for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
